<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Créations - ArtSango</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --charcoal: #0e0c0a;
      --burnt: #bf6a3c;
      --gold: #c9a05a;
      --sand: #d8c4a0;
      --cream: #f4eadb;
      --teal: #0f766e;
      --glass: rgba(14,12,10,0.65);
      --glass-border: rgba(201,160,90,0.2);
      --card-bg: #fdf8f2;
      --card-border: #e8dcc8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: var(--charcoal); color: var(--cream); min-height: 100dvh; }

    .bg {
      position: fixed; inset: 0; z-index: -2;
      background-image:
        linear-gradient(125deg, rgba(10,8,6,0.88) 0%, rgba(26,16,10,0.6) 50%, rgba(10,8,6,0.92) 100%),
        url("https://images.unsplash.com/photo-1541580621-cb2562a7a8a3?auto=format&fit=crop&w=1800&q=80");
      background-size: cover; background-position: center;
    }

    /* ── Topbar ── */
    .topbar {
      position: fixed;
      top: calc(14px + env(safe-area-inset-top));
      left: 50%; transform: translateX(-50%);
      width: min(1160px, calc(100% - 32px));
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 12px 18px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .logo {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 700; font-size: 1.35rem;
      color: var(--cream); text-decoration: none;
      display: flex; align-items: center; gap: 9px;
    }
    .logo img { width: 32px; height: 32px; border-radius: 7px; object-fit: cover; display: none; }
    .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn-nav {
      text-decoration: none; font-size: .85rem; font-weight: 600;
      padding: 9px 16px; border-radius: 9px; transition: opacity .15s;
    }
    .btn-nav:hover { opacity: .85; }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--burnt)); color: #1a0d06; }
    .btn-ghost { background: rgba(255,255,255,0.1); color: var(--cream); border: 1px solid var(--glass-border); }

    /* ── Shell ── */
    .wrap {
      max-width: 1160px; margin: 0 auto;
      padding: calc(100px + env(safe-area-inset-top)) 16px calc(32px + env(safe-area-inset-bottom));
    }
    .page-header { margin-bottom: 18px; }
    .page-header h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700; color: var(--cream);
      margin-bottom: 4px;
    }
    .page-header p { color: var(--sand); font-size: .9rem; }

    /* ── Filtres ── */
    .filters {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      margin-bottom: 20px;
      background: rgba(14,12,10,0.55);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 10px 14px;
    }
    .filters input, .filters select {
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid rgba(201,160,90,0.3);
      background: rgba(14,12,10,0.7); color: var(--cream);
      font: inherit; font-size: .87rem;
      flex: 1; min-width: 160px;
    }
    .filters input::placeholder { color: #9ca3af; }
    .filters select option { background: #1a0e08; color: var(--cream); }

    .interest-line {
      margin: 0 0 16px;
      padding-left: 2px;
      font-size: .82rem;
      color: var(--sand);
    }
    .interest-line strong { color: var(--cream); }

    /* ── Grille ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    /* ── Carte produit ── */
    .item {
      background: rgba(14,12,10,0.58);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform .2s, box-shadow .2s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .item:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,.32); }

    .img-wrap { position: relative; height: 180px; background: #e8dcc8; flex-shrink: 0; overflow: hidden; }
    .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; }
    .item:hover .img-wrap img { transform: scale(1.04); }

    .fav-btn {
      position: absolute; top: 8px; right: 8px;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,0.9);
      border: none; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s;
    }
    .fav-btn:active { transform: scale(1.2); }

    .card-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-body h3 { font-size: .95rem; font-weight: 600; color: var(--cream); line-height: 1.35; }

    /* Ligne boutique */
    .shop-row {
      display: flex; align-items: center; gap: 7px;
      text-decoration: none; padding: 6px 8px; border-radius: 8px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(201,160,90,0.2);
      transition: background .15s;
    }
    .shop-row:hover { background: rgba(255,255,255,0.1); }
    .shop-avatar {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--teal), #1d4ed8);
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; font-weight: 800; color: #fff; overflow: hidden;
    }
    .shop-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .shop-info { flex: 1; min-width: 0; }
    .shop-name { font-size: .77rem; font-weight: 700; color: var(--cream); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .shop-stars { font-size: .7rem; color: #f59e0b; }
    .shop-stars span { color: var(--sand); font-size: .68rem; }
    .badge-ok { font-size: .62rem; background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 999px; font-weight: 700; flex-shrink: 0; }

    .price { font-weight: 700; font-size: 1rem; color: #f0cf96; }

    /* Actions */
    .card-actions { display: flex; gap: 6px; margin-top: auto; }
    .btn-card {
      flex: 1; border: none; border-radius: 8px; padding: 9px 6px;
      font-weight: 600; font-size: .78rem; cursor: pointer;
      text-decoration: none; text-align: center;
      display: inline-flex; align-items: center; justify-content: center;
      transition: opacity .15s, transform .1s;
    }
    .btn-card:active { transform: scale(.97); }
    .btn-view   { background: var(--teal); color: #fff; }
    .btn-cart   { background: #fff; color: var(--teal); border: 1.5px solid var(--teal); }
    .btn-cart   { background: rgba(255,255,255,0.08); color: var(--cream); border: 1.5px solid rgba(201,160,90,0.35); }
    .btn-cart.added { background: #f0fdf4; color: #166534; border-color: #86efac; }
    .btn-boutique { background: rgba(255,255,255,0.08); color: var(--cream); border: 1.5px solid rgba(201,160,90,0.28); }
    .btn-boutique:hover { background: rgba(255,255,255,0.14); }

    .empty { text-align: center; padding: 60px; color: var(--sand); grid-column: 1/-1; font-size: .95rem; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: var(--teal); color: #fff; padding: 11px 20px; border-radius: 10px;
      font-weight: 600; font-size: .88rem; opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s; z-index: 9999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .topbar { justify-content: flex-start; }
      .topbar-right { display: none; }
      .img-wrap { height: 132px; }
      .card-body { padding: 9px 10px; gap: 6px; }
      .card-body h3 { font-size: .85rem; line-height: 1.3; }
      .shop-name { font-size: .72rem; }
      .price { font-size: .88rem; }
      .btn-card { font-size: .7rem; padding: 8px 4px; }
    }
    @media (max-width: 380px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <header class="topbar">
    <a class="logo" href="index.html">
      <img class="platform-logo-dynamic" alt="Logo ArtSango">
      <span>ArtSango</span>
    </a>
    <div class="topbar-right">
      <a class="btn-nav btn-ghost" id="dashboard-btn" href="index.html" style="display:none;">Mon espace</a>
      <a class="btn-nav btn-ghost" href="messagerie.html">Messagerie</a>
      <a class="btn-nav btn-gold" href="panier.html">Panier (<span id="cart-count">0</span>)</a>
    </div>
  </header>

  <div class="wrap">
    <div class="page-header">
      <h1>Créations africaines</h1>
      <p>Découvrez les œuvres d'artisans talentueux du continent</p>
    </div>

    <div class="filters">
      <input id="search-input" type="search" placeholder="Article, boutique, artisan…">
      <select id="cat-filter">
        <option value="">Toutes catégories</option>
        <option>Mode</option><option>Décoration</option><option>Sculpture</option>
        <option>Peinture</option><option>Bijoux</option><option>Poterie</option>
        <option>Textile</option><option>Art mural</option>
      </select>
      <select id="country-filter">
        <option value="">Tous pays</option>
        <option>Bénin</option><option>Côte d'Ivoire</option><option>Sénégal</option>
        <option>Togo</option><option>Ghana</option>
      </select>
    </div>

    <div class="interest-line" id="market-interest-line" aria-live="polite"></div>

    <section class="grid" id="products-grid">
      <div class="empty">Chargement des créations…</div>
    </section>
  </div>

  <div id="toast"></div>

  <script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy, doc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:"AIzaSyAghL7HcGVTWur9ijJzjWXywTgvCaiJ01M",
      authDomain:"art-sango.firebaseapp.com",
      projectId:"art-sango",
      storageBucket:"art-sango.firebasestorage.app",
      messagingSenderId:"840868763552",
      appId:"1:840868763552:web:b7cb1ac710d3b9968436c5"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);
    const authPersistenceReady = setPersistence(auth, browserLocalPersistence)
      .catch((e) => console.warn('Persistance auth locale indisponible:', e.message));

    let allProducts  = [];
    let artisansData = {};
    let currentUser  = null, currentRole = '', authResolved = false;
    let resolveAuth; const authReady = new Promise(r => { resolveAuth = r; });

    /* ── Auth ── */
    await authPersistenceReady;
    onAuthStateChanged(auth, async user => {
      currentUser = user; currentRole = '';
      const btn = document.getElementById('dashboard-btn');
      if (!user) { btn.style.display = 'none'; authResolved = true; resolveAuth(); return; }
      try {
        const a = await getDoc(doc(db,'artisans',user.uid));
        if (a.exists()) {
          localStorage.setItem('artsango_user_role', 'artisan');
          currentRole = 'artisan'; btn.href = 'dashboard-artisan.html'; btn.textContent = 'Mon tableau de bord'; btn.style.display = 'inline-flex';
        } else {
          const c = await getDoc(doc(db,'clients',user.uid));
          if (c.exists()) { localStorage.setItem('artsango_user_role', 'client'); currentRole = 'client'; btn.href = 'dashboard-client.html'; btn.textContent = 'Mon espace'; btn.style.display = 'inline-flex'; }
        }
      } catch {}
      authResolved = true; resolveAuth();
    });

    /* ── Utilitaires ── */
    const getFavs    = () => { try { return JSON.parse(localStorage.getItem('artsango_favs')||'[]'); } catch { return []; } };
    const toggleFav  = id => { let f=getFavs(); f=f.includes(id)?f.filter(x=>x!==id):[...f,id]; localStorage.setItem('artsango_favs',JSON.stringify(f)); };
    const getImg     = p  => p.imageUrl||p.imageURL||p.image||p.photoUrl||p.photo||p.img||'';
    const updateCartCount = () => document.getElementById('cart-count').textContent = JSON.parse(localStorage.getItem('artsango_cart')||'[]').length;
    updateCartCount();

    const MARKET_INTEREST_KEY = 'artsango_market_interests';
    let marketSearchTimer = null;

    function normalizeText(value) {
      return String(value || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, ' ')
        .trim();
    }

    function tokenizeText(value) {
      return normalizeText(value).split(/\s+/).filter((word) => word.length >= 3);
    }

    function readInterestMap() {
      try { return JSON.parse(localStorage.getItem(MARKET_INTEREST_KEY) || '{}'); } catch { return {}; }
    }

    function writeInterestMap(map) {
      try { localStorage.setItem(MARKET_INTEREST_KEY, JSON.stringify(map)); } catch {}
    }

    function recordSearchInterest(rawQuery) {
      const terms = tokenizeText(rawQuery);
      if (!terms.length) return;
      const map = readInterestMap();
      terms.forEach((term) => {
        map[term] = (map[term] || 0) + 1;
      });
      writeInterestMap(map);
    }

    function getInterestTerms() {
      const map = readInterestMap();
      return Object.entries(map)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 8)
        .map(([term]) => term);
    }

    function productTextBlob(product) {
      return normalizeText([
        product.name,
        product.category,
        product.catalogSection,
        product.section,
        product.artisanName,
        product.country,
        product.description,
      ].filter(Boolean).join(' '));
    }

    function scoreProduct(product, terms) {
      if (!terms.length) return 0;
      const blob = productTextBlob(product);
      const name = normalizeText(product.name);
      const category = normalizeText(product.category);
      const section = normalizeText(product.catalogSection || product.section || '');
      let score = 0;

      terms.forEach((term, index) => {
        if (!term) return;
        if (blob.includes(term)) score += 4;
        if (name.includes(term)) score += 4;
        if (category.includes(term)) score += 3;
        if (section.includes(term)) score += 3;
        if (product.artisanName && normalizeText(product.artisanName).includes(term)) score += 1;
        score -= index * 0.05;
      });

      return score;
    }

    function shuffleList(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function isVerifiedShop(product) {
      const artisan = artisansData[product.artisanId] || {};
      return Boolean(artisan.verified);
    }

    function sortMarketplaceProducts(list, queryText = '') {
      const terms = getInterestTerms();
      const queryTerms = tokenizeText(queryText);
      if (!terms.length && !queryTerms.length) {
        const verified = list.filter((product) => isVerifiedShop(product));
        const others = list.filter((product) => !isVerifiedShop(product));
        return [...shuffleList(verified), ...shuffleList(others)];
      }

      return list
        .map((product) => ({
          product,
          score: scoreProduct(product, terms) + scoreProduct(product, queryTerms) + (isVerifiedShop(product) ? 3 : 0),
          rand: Math.random(),
        }))
        .sort((a, b) => b.score - a.score || a.rand - b.rand)
        .map((item) => item.product);
    }

    function scheduleSearchInterestCapture(queryText) {
      clearTimeout(marketSearchTimer);
      const terms = tokenizeText(queryText);
      if (!terms.length) return;
      marketSearchTimer = setTimeout(() => recordSearchInterest(queryText), 700);
    }

    function starsHtml(avg) {
      if (!avg) return '';
      const full = Math.floor(avg), half = (avg - full) >= 0.5;
      return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - (half ? 1 : 0));
    }
    function showToast(msg) {
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    /* ── Chargement ── */
    async function loadProducts() {
      try {
        const snap = await getDocs(collection(db,'produits'));
        allProducts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      } catch(e) { console.warn(e.message); allProducts = []; }

      const ids = [...new Set(allProducts.map(p => p.artisanId).filter(Boolean))];
      await Promise.all(ids.map(async id => {
        try { const s = await getDoc(doc(db,'artisans',id)); if (s.exists()) artisansData[id] = s.data(); } catch {}
      }));
      renderProducts(allProducts);
    }

    /* ── FILTRE CORRIGÉ : trim + split pour ignorer espaces parasites ── */
    function filterProducts() {
      const rawQ = document.getElementById('search-input').value.trim();
      const q   = normalizeText(rawQ);
      const cat = document.getElementById('cat-filter').value;
      const ctr = document.getElementById('country-filter').value;

      scheduleSearchInterestCapture(rawQ);
      const terms = q ? q.split(/\s+/).filter(Boolean) : [];

      renderProducts(allProducts.filter(p => {
        const shop = normalizeText(artisansData[p.artisanId]?.brandName || p.artisanName || '');
        const name = normalizeText(p.name || '');
        const matchSearch = terms.length === 0 || terms.every(t => name.includes(t) || shop.includes(t));
        const matchCat = !cat || p.category === cat;
        const matchCtr = !ctr || p.country === ctr;
        return matchSearch && matchCat && matchCtr;
      }), rawQ);
    }

    document.getElementById('search-input').addEventListener('input', filterProducts);
    document.getElementById('cat-filter').addEventListener('change', filterProducts);
    document.getElementById('country-filter').addEventListener('change', filterProducts);

    /* ── Rendu ── */
    function renderProducts(list, queryText = '') {
      const grid = document.getElementById('products-grid');
      const interestLine = document.getElementById('market-interest-line');
      const favs = getFavs();
      const cartIds = JSON.parse(localStorage.getItem('artsango_cart')||'[]').map(i => i.id);
      if (interestLine) {
        if (queryText) {
          interestLine.textContent = `Résultats pour ${queryText}`;
        } else {
          const terms = getInterestTerms();
          interestLine.textContent = terms.length
            ? `Centre d'intérêt: ${terms.slice(0, 4).join(', ')}`
            : '';
        }
      }
      if (!list.length) { grid.innerHTML = '<div class="empty">Aucune création trouvée.</div>'; return; }

      grid.innerHTML = sortMarketplaceProducts(list, queryText).map(p => {
        const isFav = favs.includes(p.id), inCart = cartIds.includes(p.id);
        const img = getImg(p);
        const art = artisansData[p.artisanId] || {};
        const shopName = art.brandName || p.artisanName || '—';
        const shopPhoto = art.profilePhoto || '';
        const initials = shopName.trim().split(/\s+/).map(w => w[0]).join('').substring(0,2).toUpperCase();
        const avg = art.avgRating || 0, cnt = art.ratingCount || 0;
        const boutUrl = 'boutique-vendeur.html?id=' + (p.artisanId || '');

        return `
        <article class="item">
          <div class="img-wrap">
            ${img ? `<img src="${img}" alt="${p.name||''}" loading="lazy">` : ''}
            <button class="fav-btn" data-fav-id="${p.id}" title="${isFav?'Retirer des favoris':'Ajouter aux favoris'}">${isFav?'♥':'♡'}</button>
          </div>
          <div class="card-body">
            <h3>${p.name||'—'}</h3>
            <a class="shop-row" href="${boutUrl}">
              <div class="shop-avatar">
                ${shopPhoto ? `<img src="${shopPhoto}" alt="${shopName}">` : initials}
              </div>
              <div class="shop-info">
                <span class="shop-name">${shopName}</span>
                ${avg ? `<div class="shop-stars">${starsHtml(avg)} <span>(${cnt})</span></div>` : ''}
              </div>
              ${art.verified ? '<span class="badge-ok">Vérifié</span>' : ''}
            </a>
            <div class="price">${(p.price||0).toLocaleString('fr-FR')} XOF</div>
            <div class="card-actions">
              <button class="btn-card btn-view"  data-view-id="${p.id}">Voir le produit</button>
              <button class="btn-card btn-cart ${inCart?'added':''}" data-cart-id="${p.id}">${inCart?'Dans le panier':'Ajouter au panier'}</button>
              <a      class="btn-card btn-boutique" href="${boutUrl}">La boutique</a>
            </div>
          </div>
        </article>`;
      }).join('');
    }

    /* ── Événements ── */
    document.getElementById('products-grid').addEventListener('click', e => {
      const fav  = e.target.closest('[data-fav-id]');
      const view = e.target.closest('[data-view-id]');
      const cart = e.target.closest('[data-cart-id]');
      if (fav)  { e.stopPropagation(); toggleFav(fav.dataset.favId); fav.textContent = getFavs().includes(fav.dataset.favId) ? '♥' : '♡'; return; }
      if (view) { e.stopPropagation(); viewProduct(view.dataset.viewId); return; }
      if (cart) { e.stopPropagation(); addToCart(cart.dataset.cartId, cart); return; }
    });

    async function viewProduct(id) {
      if (!authResolved) await authReady;
      if (!currentUser || (currentRole !== 'client' && currentRole !== 'artisan')) {
        window.location.href = `connexion-client.html?next=${encodeURIComponent('produit-detail.html?id='+id)}`; return;
      }
      window.location.href = 'produit-detail.html?id=' + id;
    }

    function addToCart(id, btn) {
      const p = allProducts.find(x => x.id === id); if (!p) return;
      let c = JSON.parse(localStorage.getItem('artsango_cart')||'[]');
      if (c.find(i => i.id === id)) { showToast('Déjà dans votre panier'); return; }
      c.push({ id:p.id, name:p.name||'—', price:p.price||0, artisanId:p.artisanId||'', artisanName:p.artisanName||'', category:p.category||'', imageUrl:getImg(p) });
      localStorage.setItem('artsango_cart', JSON.stringify(c));
      updateCartCount();
      btn.textContent = 'Dans le panier'; btn.classList.add('added');
      showToast(`"${p.name||'Article'}" ajouté au panier`);
    }

    loadProducts();
  </script>
  <script type="module" src="./platform-logo.js"></script>
  <script defer src="./sw-register.js"></script>
  <script defer src="./mobile-nav.js"></script>
</body>
</html>
