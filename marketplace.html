<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Créations - ArtSango</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --charcoal: #0e0c0a;
      --burnt: #bf6a3c;
      --gold: #c9a05a;
      --sand: #d8c4a0;
      --cream: #f4eadb;
      --teal: #0f766e;
      --glass: rgba(14,12,10,0.65);
      --glass-border: rgba(201,160,90,0.2);
      --card-bg: #fdf8f2;
      --card-border: #e8dcc8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "DM Sans", sans-serif; background: var(--charcoal); color: var(--cream); min-height: 100dvh; }

    .bg {
      position: fixed; inset: 0; z-index: -2;
      background-image:
        linear-gradient(125deg, rgba(10,8,6,0.88) 0%, rgba(26,16,10,0.6) 50%, rgba(10,8,6,0.92) 100%),
        url("https://images.unsplash.com/photo-1541580621-cb2562a7a8a3?auto=format&fit=crop&w=1800&q=80");
      background-size: cover; background-position: center;
    }

    /* ── Topbar ── */
    .topbar {
      position: fixed;
      top: calc(14px + env(safe-area-inset-top));
      left: 50%; transform: translateX(-50%);
      width: min(1160px, calc(100% - 32px));
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 12px 18px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .logo {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 700; font-size: 1.35rem;
      color: var(--cream); text-decoration: none;
      display: flex; align-items: center; gap: 9px;
    }
    .logo img { width: 32px; height: 32px; border-radius: 7px; object-fit: cover; display: none; }
    .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn-nav {
      text-decoration: none; font-size: .85rem; font-weight: 600;
      padding: 9px 16px; border-radius: 9px; transition: opacity .15s;
    }
    .btn-nav:hover { opacity: .85; }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--burnt)); color: #1a0d06; }
    .btn-ghost { background: rgba(255,255,255,0.1); color: var(--cream); border: 1px solid var(--glass-border); }

    /* ── Shell ── */
    .wrap {
      max-width: 1160px; margin: 0 auto;
      padding: calc(100px + env(safe-area-inset-top)) 16px calc(32px + env(safe-area-inset-bottom));
    }
    .page-header { margin-bottom: 18px; }
    .page-header h1 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700; color: var(--cream);
      margin-bottom: 4px;
    }
    .page-header p { color: var(--sand); font-size: .9rem; }

    /* ── Filtres ── */
    .filters {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      margin-bottom: 20px;
      background: rgba(14,12,10,0.55);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 10px 14px;
    }
    .filters input, .filters select {
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid rgba(201,160,90,0.3);
      background: rgba(14,12,10,0.7); color: var(--cream);
      font: inherit; font-size: .87rem;
      flex: 1; min-width: 160px;
    }
    .filters input::placeholder { color: #9ca3af; }
    .filters select option { background: #1a0e08; color: var(--cream); }

    .interest-shell {
      margin-bottom: 18px;
      padding: 16px;
      background: rgba(14,12,10,0.45);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      backdrop-filter: blur(12px);
    }
    .interest-head { display:flex; align-items:flex-end; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .interest-title { margin:0; font-family: "Cormorant Garamond", Georgia, serif; font-size: 1.35rem; color: var(--cream); }
    .interest-meta { margin-top: 4px; color: var(--sand); font-size: .85rem; line-height: 1.4; }
    .interest-grid { margin-top: 12px; }

    /* ── Grille ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    /* ── Carte produit ── */
    .item {
      background: rgba(14,12,10,0.58);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform .2s, box-shadow .2s;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .item:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,.32); }

    .img-wrap { position: relative; height: 180px; background: #e8dcc8; flex-shrink: 0; overflow: hidden; }
    .img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; }
    .item:hover .img-wrap img { transform: scale(1.04); }

    .fav-btn {
      position: absolute; top: 8px; right: 8px;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(255,255,255,0.9);
      border: none; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      transition: transform .12s;
    }
    .fav-btn:active { transform: scale(1.2); }

    .card-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .card-body h3 { font-size: .95rem; font-weight: 600; color: var(--cream); line-height: 1.35; }

    /* Ligne boutique */
    .shop-row {
      display: flex; align-items: center; gap: 7px;
      text-decoration: none; padding: 6px 8px; border-radius: 8px;
      background: rgba(255,255,255,0.06); border: 1px solid rgba(201,160,90,0.2);
      transition: background .15s;
    }
    .shop-row:hover { background: rgba(255,255,255,0.1); }
    .shop-avatar {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--teal), #1d4ed8);
      display: flex; align-items: center; justify-content: center;
      font-size: .6rem; font-weight: 800; color: #fff; overflow: hidden;
    }
    .shop-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .shop-info { flex: 1; min-width: 0; }
    .shop-name { font-size: .77rem; font-weight: 700; color: var(--cream); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .shop-stars { font-size: .7rem; color: #f59e0b; }
    .shop-stars span { color: var(--sand); font-size: .68rem; }
    .badge-ok { font-size: .62rem; background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 999px; font-weight: 700; flex-shrink: 0; }

    .price { font-weight: 700; font-size: 1rem; color: #f0cf96; }

    /* Actions */
    .card-actions { display: flex; gap: 6px; margin-top: auto; }
    .btn-card {
      flex: 1; border: none; border-radius: 8px; padding: 9px 6px;
      font-weight: 600; font-size: .78rem; cursor: pointer;
      text-decoration: none; text-align: center;
      display: inline-flex; align-items: center; justify-content: center;
      transition: opacity .15s, transform .1s;
    }
    .btn-card:active { transform: scale(.97); }
    .btn-view   { background: var(--teal); color: #fff; }
    .btn-cart   { background: #fff; color: var(--teal); border: 1.5px solid var(--teal); }
    .btn-cart   { background: rgba(255,255,255,0.08); color: var(--cream); border: 1.5px solid rgba(201,160,90,0.35); }
    .btn-cart.added { background: #f0fdf4; color: #166534; border-color: #86efac; }
    .btn-boutique { background: rgba(255,255,255,0.08); color: var(--cream); border: 1.5px solid rgba(201,160,90,0.28); }
    .btn-boutique:hover { background: rgba(255,255,255,0.14); }

    .empty { text-align: center; padding: 60px; color: var(--sand); grid-column: 1/-1; font-size: .95rem; }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: var(--teal); color: #fff; padding: 11px 20px; border-radius: 10px;
      font-weight: 600; font-size: .88rem; opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s; z-index: 9999; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .topbar { flex-direction: column; gap: 8px; }
      .topbar-right { width: 100%; justify-content: space-between; }
    }
    @media (max-width: 380px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <header class="topbar">
    <a class="logo" href="index.html">
      <img class="platform-logo-dynamic" alt="Logo ArtSango">
      <span>ArtSango</span>
    </a>
    <div class="topbar-right">
      <a class="btn-nav btn-ghost" id="dashboard-btn" href="index.html" style="display:none;">Mon espace</a>
      <a class="btn-nav btn-gold" href="panier.html">Panier (<span id="cart-count">0</span>)</a>
    </div>
  </header>

  <div class="wrap">
    <div class="page-header">
      <h1>Créations africaines</h1>
      <p>Découvrez les œuvres d'artisans talentueux du continent</p>
    </div>

    <section class="interest-shell" id="interest-shell" hidden>
      <div class="interest-head">
        <div>
          <h2 class="interest-title">Centre d’intérêts</h2>
          <p class="interest-meta" id="interest-meta"></p>
        </div>
      </div>
      <div class="grid interest-grid" id="interest-grid"></div>
    </section>

    <div class="filters">
      <input id="search-input" type="search" placeholder="Article, boutique, artisan…">
      <select id="cat-filter">
        <option value="">Toutes catégories</option>
        <option>Mode</option><option>Décoration</option><option>Sculpture</option>
        <option>Peinture</option><option>Bijoux</option><option>Poterie</option>
        <option>Textile</option><option>Art mural</option>
      </select>
      <select id="country-filter">
        <option value="">Tous pays</option>
        <option>Bénin</option><option>Côte d'Ivoire</option><option>Sénégal</option>
        <option>Togo</option><option>Ghana</option>
      </select>
    </div>

    <section class="grid" id="products-grid">
      <div class="empty">Chargement des créations…</div>
    </section>
  </div>

  <div id="toast"></div>

  <script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, getDoc }
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:"AIzaSyAghL7HcGVTWur9ijJzjWXywTgvCaiJ01M",
      authDomain:"art-sango.firebaseapp.com",
      projectId:"art-sango",
      storageBucket:"art-sango.firebasestorage.app",
      messagingSenderId:"840868763552",
      appId:"1:840868763552:web:b7cb1ac710d3b9968436c5"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    const params = new URLSearchParams(location.search);
    const initialCat = params.get('cat') || '';
    const initialSearch = params.get('q') || '';
    const initialCountry = params.get('country') || '';

    const searchInput = document.getElementById('search-input');
    const catFilter = document.getElementById('cat-filter');
    const countryFilter = document.getElementById('country-filter');
    if (searchInput && initialSearch) searchInput.value = initialSearch;

    function normalizeText(value = '') {
      return String(value)
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase();
    }

    function slugify(value = '') {
      return normalizeText(value)
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function tokenize(value = '') {
      return normalizeText(value)
        .split(/[^a-z0-9]+/)
        .map(t => t.trim())
        .filter(Boolean)
        .filter(t => t.length > 1 && !STOP_WORDS.has(t));
    }

    function labelForSlug(select, slug) {
      if (!select || !slug) return '';
      const target = slugify(slug);
      const options = Array.from(select.options || []);
      const match = options.find(opt => slugify(opt.value || opt.textContent || '') === target || slugify(opt.textContent || '') === target);
      return (match ? match.textContent.trim() : slug) || slug;
    }

    if (catFilter && initialCat) catFilter.value = labelForSlug(catFilter, initialCat);
    if (countryFilter && initialCountry) countryFilter.value = labelForSlug(countryFilter, initialCountry);

    let allProducts  = [];
    let artisansData = {};
    let currentUser  = null, currentRole = '', authResolved = false;
    let resolveAuth; const authReady = new Promise(r => { resolveAuth = r; });
    let searchDebounce = null;
    let lastInterestSignature = '';

    const INTEREST_KEY = 'artsango_marketplace_interest';
    const FEATURED_LIMIT = 6;
    const STOP_WORDS = new Set(['a','al','au','aux','de','des','du','et','en','la','le','les','pour','sur','un','une','the','of','with']);

    function safeProfile() {
      return {
        recentSearches: [],
        terms: {},
        categories: {},
        countries: {},
        artisans: {},
        products: {},
        updatedAt: 0,
      };
    }

    function loadInterestProfile() {
      try {
        const raw = JSON.parse(localStorage.getItem(INTEREST_KEY) || 'null');
        if (!raw || typeof raw !== 'object' || Array.isArray(raw)) return safeProfile();
        return {
          recentSearches: Array.isArray(raw.recentSearches) ? raw.recentSearches.filter(Boolean) : [],
          terms: raw.terms && typeof raw.terms === 'object' ? raw.terms : {},
          categories: raw.categories && typeof raw.categories === 'object' ? raw.categories : {},
          countries: raw.countries && typeof raw.countries === 'object' ? raw.countries : {},
          artisans: raw.artisans && typeof raw.artisans === 'object' ? raw.artisans : {},
          products: raw.products && typeof raw.products === 'object' ? raw.products : {},
          updatedAt: raw.updatedAt || 0,
        };
      } catch {
        return safeProfile();
      }
    }

    function saveInterestProfile(profile) {
      try { localStorage.setItem(INTEREST_KEY, JSON.stringify(profile)); } catch {}
    }

    function bump(map, key, weight = 1) {
      if (!key) return;
      map[key] = (map[key] || 0) + weight;
    }

    function topEntries(map, limit = 3) {
      return Object.entries(map || {})
        .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'fr'))
        .slice(0, limit);
    }

    function hasInterestSignals(profile) {
      if (!profile) return false;
      const maps = [profile.terms, profile.categories, profile.countries, profile.artisans, profile.products];
      return (profile.recentSearches || []).length > 0 || maps.some(map => Object.values(map || {}).some(v => Number(v) > 0));
    }

    function formatInterestSummary(profile) {
      if (!profile) return '';
      if ((profile.recentSearches || []).length) return profile.recentSearches.slice(0, 3).join(' · ');
      const cats = topEntries(profile.categories, 3).map(([slug]) => labelForSlug(catFilter, slug));
      if (cats.length) return cats.join(' · ');
      const countries = topEntries(profile.countries, 3).map(([slug]) => labelForSlug(countryFilter, slug));
      if (countries.length) return countries.join(' · ');
      const terms = topEntries(profile.terms, 3).map(([term]) => term);
      return terms.join(' · ');
    }

    /* ── Auth ── */
    onAuthStateChanged(auth, async user => {
      currentUser = user; currentRole = '';
      const btn = document.getElementById('dashboard-btn');
      if (!user) { btn.style.display = 'none'; authResolved = true; resolveAuth(); return; }
      try {
        const a = await getDoc(doc(db,'artisans',user.uid));
        if (a.exists()) {
          currentRole = 'artisan'; btn.href = 'dashboard-artisan.html'; btn.textContent = 'Mon tableau de bord'; btn.style.display = 'inline-flex';
        } else {
          const c = await getDoc(doc(db,'clients',user.uid));
          if (c.exists()) { currentRole = 'client'; btn.href = 'dashboard-client.html'; btn.textContent = 'Mon espace'; btn.style.display = 'inline-flex'; }
        }
      } catch {}
      authResolved = true; resolveAuth();
    });

    /* ── Utilitaires ── */
    const getFavs = () => { try { return JSON.parse(localStorage.getItem('artsango_favs') || '[]'); } catch { return []; } };
    const toggleFav = id => {
      let f = getFavs();
      f = f.includes(id) ? f.filter(x => x !== id) : [...f, id];
      localStorage.setItem('artsango_favs', JSON.stringify(f));
    };
    const getImg = p => p.imageUrl || p.imageURL || p.image || p.photoUrl || p.photo || p.img || '';
    const updateCartCount = () => document.getElementById('cart-count').textContent = JSON.parse(localStorage.getItem('artsango_cart') || '[]').length;
    updateCartCount();

    function shuffleProducts(list) {
      const arr = [...list];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getFilterState() {
      return {
        query: searchInput?.value?.trim() || '',
        cat: slugify(catFilter?.value || ''),
        country: slugify(countryFilter?.value || ''),
      };
    }

    function seedInitialInterestFromFilters() {
      const state = getFilterState();
      if (!state.query && !state.cat && !state.country) return;
      lastInterestSignature = `${state.query}|${state.cat}|${state.country}`;
      recordSearchInterest(state);
    }

    function recordSearchInterest(state) {
      const profile = loadInterestProfile();
      const q = (state.query || '').trim();
      let summary = '';
      if (q.length >= 2) {
        summary = q.slice(0, 80);
        tokenize(q).forEach(term => bump(profile.terms, term, 2));
      } else {
        const parts = [];
        if (state.cat) parts.push(labelForSlug(catFilter, state.cat));
        if (state.country) parts.push(labelForSlug(countryFilter, state.country));
        summary = parts.join(' · ');
      }
      if (state.cat) bump(profile.categories, state.cat, 3);
      if (state.country) bump(profile.countries, state.country, 1);
      if (summary) {
        const normalized = slugify(summary);
        profile.recentSearches = [summary, ...(profile.recentSearches || []).filter(item => slugify(item) !== normalized)].slice(0, 8);
      }
      profile.updatedAt = Date.now();
      saveInterestProfile(profile);
    }

    function recordProductInterest(p) {
      const profile = loadInterestProfile();
      const category = slugify(p.category || '');
      const country = slugify(p.country || '');
      if (category) bump(profile.categories, category, 2);
      if (country) bump(profile.countries, country, 1);
      if (p.artisanId) bump(profile.artisans, p.artisanId, 2);
      if (p.id) bump(profile.products, p.id, 4);
      const artisanName = artisansData[p.artisanId]?.brandName || p.artisanName || '';
      tokenize([p.name || '', artisanName].join(' ')).forEach(term => bump(profile.terms, term, 1));
      profile.updatedAt = Date.now();
      saveInterestProfile(profile);
    }

    function scoreProduct(p, profile) {
      let score = 0;
      const name = normalizeText(p.name || '');
      const shop = normalizeText(artisansData[p.artisanId]?.brandName || p.artisanName || '');
      const category = normalizeText(p.category || '');
      const country = normalizeText(p.country || '');
      const categorySlug = slugify(p.category || '');
      const countrySlug = slugify(p.country || '');

      score += (profile.products?.[p.id] || 0) * 20;
      score += (profile.artisans?.[p.artisanId] || 0) * 8;
      score += (profile.categories?.[categorySlug] || 0) * 16;
      score += (profile.countries?.[countrySlug] || 0) * 4;

      for (const [term, count] of Object.entries(profile.terms || {})) {
        if (name.includes(term) || shop.includes(term) || category.includes(term) || country.includes(term)) {
          score += count * 4;
        }
      }
      return score;
    }

    function rankProducts(list, profile) {
      if (!hasInterestSignals(profile)) return [...list];
      return [...list]
        .map((p, index) => ({ p, index, score: scoreProduct(p, profile) }))
        .sort((a, b) => b.score - a.score || a.index - b.index)
        .map(item => item.p);
    }

    function starsHtml(avg) {
      if (!avg) return '';
      const full = Math.floor(avg), half = (avg - full) >= 0.5;
      return '★'.repeat(full) + (half ? '½' : '') + '☆'.repeat(5 - full - (half ? 1 : 0));
    }
    function showToast(msg) {
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    function renderProductCard(p) {
      const favs = new Set(getFavs());
      const cartIds = new Set(JSON.parse(localStorage.getItem('artsango_cart') || '[]').map(i => i.id));
      const isFav = favs.has(p.id);
      const inCart = cartIds.has(p.id);
      const img = getImg(p);
      const art = artisansData[p.artisanId] || {};
      const shopName = art.brandName || p.artisanName || '—';
      const shopPhoto = art.profilePhoto || '';
      const initials = shopName.trim().split(/\s+/).map(w => w[0]).join('').substring(0, 2).toUpperCase();
      const avg = art.avgRating || 0, cnt = art.ratingCount || 0;
      const boutUrl = 'boutique-vendeur.html?id=' + (p.artisanId || '');

      return `
        <article class="item">
          <div class="img-wrap">
            ${img ? `<img src="${img}" alt="${p.name || ''}" loading="lazy">` : ''}
            <button class="fav-btn" data-fav-id="${p.id}" title="${isFav ? 'Retirer des favoris' : 'Ajouter aux favoris'}">${isFav ? '♥' : '♡'}</button>
          </div>
          <div class="card-body">
            <h3>${p.name || '—'}</h3>
            <a class="shop-row" href="${boutUrl}">
              <div class="shop-avatar">
                ${shopPhoto ? `<img src="${shopPhoto}" alt="${shopName}">` : initials}
              </div>
              <div class="shop-info">
                <span class="shop-name">${shopName}</span>
                ${avg ? `<div class="shop-stars">${starsHtml(avg)} <span>(${cnt})</span></div>` : ''}
              </div>
              ${art.verified ? '<span class="badge-ok">Vérifié</span>' : ''}
            </a>
            <div class="price">${(p.price || 0).toLocaleString('fr-FR')} XOF</div>
            <div class="card-actions">
              <button class="btn-card btn-view" data-view-id="${p.id}">Voir le produit</button>
              <button class="btn-card btn-cart ${inCart ? 'added' : ''}" data-cart-id="${p.id}">${inCart ? 'Dans le panier' : 'Ajouter au panier'}</button>
              <a class="btn-card btn-boutique" href="${boutUrl}">La boutique</a>
            </div>
          </div>
        </article>`;
    }

    function renderProductGrid(gridId, list, emptyMessage) {
      const grid = document.getElementById(gridId);
      if (!grid) return;
      if (!list.length) {
        grid.innerHTML = `<div class="empty">${emptyMessage}</div>`;
        return;
      }
      grid.innerHTML = list.map(renderProductCard).join('');
    }

    function renderInterestSection(featured, profile) {
      const shell = document.getElementById('interest-shell');
      const meta = document.getElementById('interest-meta');
      const grid = document.getElementById('interest-grid');
      if (!shell || !meta || !grid) return;
      const show = hasInterestSignals(profile) && featured.length > 0;
      shell.hidden = !show;
      if (!show) {
        grid.innerHTML = '';
        meta.textContent = '';
        return;
      }
      meta.textContent = formatInterestSummary(profile);
      renderProductGrid('interest-grid', featured, '');
    }

    function renderMarketplaceView() {
      const state = getFilterState();
      const profile = loadInterestProfile();
      const filtered = allProducts.filter(p => {
        const art = artisansData[p.artisanId] || {};
        const name = normalizeText(p.name || '');
        const shop = normalizeText(art.brandName || p.artisanName || '');
        const category = normalizeText(p.category || '');
        const country = normalizeText(p.country || '');
        const terms = state.query ? state.query.split(/\s+/).map(normalizeText).filter(Boolean) : [];
        const matchSearch = terms.length === 0 || terms.every(t => name.includes(t) || shop.includes(t) || category.includes(t) || country.includes(t));
        const matchCat = !state.cat || slugify(p.category || '') === state.cat;
        const matchCountry = !state.country || slugify(p.country || '') === state.country;
        return matchSearch && matchCat && matchCountry;
      });

      const ranked = rankProducts(filtered, profile);
      const featured = hasInterestSignals(profile) ? ranked.slice(0, Math.min(FEATURED_LIMIT, ranked.length)) : [];
      const featuredIds = new Set(featured.map(p => p.id));
      const mainList = featured.length && ranked.length > featured.length ? ranked.filter(p => !featuredIds.has(p.id)) : ranked;
      const emptyMessage = state.query || state.cat || state.country
        ? 'Aucune création ne correspond à vos filtres.'
        : 'Aucune création trouvée.';

      renderInterestSection(featured, profile);
      renderProductGrid('products-grid', mainList, emptyMessage);
    }

    function scheduleInterestCapture() {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        const state = getFilterState();
        const signature = `${state.query}|${state.cat}|${state.country}`;
        if (signature === lastInterestSignature) return;
        if (!state.query && !state.cat && !state.country) return;
        lastInterestSignature = signature;
        recordSearchInterest(state);
        renderMarketplaceView();
      }, 350);
    }

    function filterProducts() {
      renderMarketplaceView();
      scheduleInterestCapture();
    }

    if (searchInput) searchInput.addEventListener('input', filterProducts);
    if (catFilter) catFilter.addEventListener('change', filterProducts);
    if (countryFilter) countryFilter.addEventListener('change', filterProducts);

    document.addEventListener('click', async e => {
      const fav = e.target.closest('[data-fav-id]');
      const view = e.target.closest('[data-view-id]');
      const cart = e.target.closest('[data-cart-id]');
      if (fav) {
        e.stopPropagation();
        const p = allProducts.find(x => x.id === fav.dataset.favId);
        toggleFav(fav.dataset.favId);
        if (p) recordProductInterest(p);
        renderMarketplaceView();
        return;
      }
      if (view) { e.stopPropagation(); viewProduct(view.dataset.viewId); return; }
      if (cart) { e.stopPropagation(); addToCart(cart.dataset.cartId); return; }
    });

    /* ── Chargement ── */
    async function loadProducts() {
      try {
        const snap = await getDocs(collection(db,'produits'));
        allProducts = shuffleProducts(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      } catch (e) { console.warn(e.message); allProducts = []; }

      const ids = [...new Set(allProducts.map(p => p.artisanId).filter(Boolean))];
      await Promise.all(ids.map(async id => {
        try { const s = await getDoc(doc(db,'artisans',id)); if (s.exists()) artisansData[id] = s.data(); } catch {}
      }));

      seedInitialInterestFromFilters();
      renderMarketplaceView();
    }

    async function viewProduct(id) {
      const p = allProducts.find(x => x.id === id);
      if (p) recordProductInterest(p);
      if (!authResolved) await authReady;
      if (!currentUser || (currentRole !== 'client' && currentRole !== 'artisan')) {
        window.location.href = `connexion-client.html?next=${encodeURIComponent('produit-detail.html?id='+id)}`; return;
      }
      window.location.href = 'produit-detail.html?id=' + id;
    }

    function addToCart(id) {
      const p = allProducts.find(x => x.id === id); if (!p) return;
      let c = JSON.parse(localStorage.getItem('artsango_cart') || '[]');
      if (c.find(i => i.id === id)) { showToast('Déjà dans votre panier'); return; }
      recordProductInterest(p);
      c.push({ id:p.id, name:p.name||'—', price:p.price||0, artisanId:p.artisanId||'', artisanName:p.artisanName||'', category:p.category||'', imageUrl:getImg(p) });
      localStorage.setItem('artsango_cart', JSON.stringify(c));
      updateCartCount();
      renderMarketplaceView();
      showToast(`"${p.name||'Article'}" ajouté au panier`);
    }

    loadProducts();

  </script>
  <script type="module" src="./platform-logo.js"></script>
</body>
</html>
