<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Connexion Client - ArtSango</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --charcoal:#0e0c0a; --burnt:#bf6a3c; --gold:#c9a05a; --sand:#d8c4a0; --cream:#f4eadb; --brand:#0f766e; --brand-dark:#0c5e58; --glass:rgba(14,12,10,0.62); --glass-border:rgba(201,160,90,0.24); }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"DM Sans",Tahoma,sans-serif; background:var(--charcoal); color:var(--cream); }
    .bg { position:fixed; inset:0; z-index:-2; background-image:linear-gradient(125deg, rgba(10,8,6,.88) 0%, rgba(26,16,10,.6) 50%, rgba(10,8,6,.92) 100%), url("https://images.unsplash.com/photo-1541580621-cb2562a7a8a3?auto=format&fit=crop&w=1800&q=80"); background-size:cover; background-position:center; }
    .wrap { padding:20px; }
    .box { max-width:560px; margin:0 auto; background:var(--glass); border:1px solid var(--glass-border); border-radius:16px; padding:28px; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
    h1 { margin:0 0 6px; font-family:"Cormorant Garamond",serif; font-size:2rem; color:#fbf3e5; }
    .sub { color:var(--sand); font-size:.9rem; margin:0 0 22px; }
    label { display:block; font-size:.83rem; font-weight:600; margin-bottom:5px; color:#e8d2b4; }
    input, select { width:100%; padding:11px 14px; margin-bottom:12px; border:1.5px solid rgba(201,160,90,.35); border-radius:10px; font:inherit; font-size:.95rem; background:rgba(10,8,6,.45); color:var(--cream); }
    .btn-submit { width:100%; background:linear-gradient(135deg,var(--gold),var(--burnt)); color:#23120a; border:0; padding:12px; border-radius:10px; font-weight:700; cursor:pointer; }
    .btn-submit:hover { background:var(--brand-dark); }
    .err { color:#dc2626; font-size:.85rem; background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:10px 12px; margin-bottom:14px; display:none; }
    .row{ display:grid; grid-template-columns:120px 1fr; gap:8px; }
    .switch { margin-top:10px; font-size:.9rem; }
    a { color:var(--gold); font-weight:600; text-decoration:none; }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="wrap">
    <div class="box">
      <h1 id="title">Connexion client</h1>
      <p class="sub">Crée ton compte client pour commander et suivre tes demandes.</p>
      <div class="err" id="err-msg"></div>

      <div id="register-fields">
        <label>Nom complet</label>
        <input id="fullName" type="text" placeholder="Ton nom complet">
        <label>Pays</label>
        <input id="country" type="text" placeholder="Bénin">
        <label>Ville</label>
        <input id="city" type="text" placeholder="Cotonou">
        <label>Préfixe WhatsApp</label>
        <select id="waPrefix">
          <option value="+229">+229 (Bénin)</option>
          <option value="+225">+225 (Côte d'Ivoire)</option>
          <option value="+221">+221 (Sénégal)</option>
          <option value="+228">+228 (Togo)</option>
          <option value="+233">+233 (Ghana)</option>
        </select>
        <label>Numéro WhatsApp</label>
        <input id="waNumber" type="tel" placeholder="01 90 00 00">
      </div>

      <label>Email</label>
      <input type="email" id="email" placeholder="ton@email.com" autocomplete="email">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

      <button class="btn-submit" id="submit-btn" onclick="submitAuth()">Se connecter</button>
      <p class="switch"><a href="#" id="switch-mode">Je n'ai pas de compte client</a></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const next = new URLSearchParams(location.search).get('next') || 'marketplace.html';
    let isRegister = false;

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      const a = await getDoc(doc(db, 'artisans', user.uid));
      if (a.exists()) { location.href = 'dashboard-artisan.html'; return; }
      const c = await getDoc(doc(db, 'clients', user.uid));
      if (c.exists()) location.href = next;
    });

    function setMode(registerMode) {
      isRegister = registerMode;
      document.getElementById('title').textContent = registerMode ? 'Inscription client' : 'Connexion client';
      document.getElementById('register-fields').style.display = registerMode ? 'block' : 'none';
      document.getElementById('submit-btn').textContent = registerMode ? 'Créer mon compte client' : 'Se connecter';
      document.getElementById('switch-mode').textContent = registerMode ? 'J\'ai déjà un compte client' : 'Je n\'ai pas de compte client';
    }
    setMode(false);

    document.getElementById('switch-mode').addEventListener('click', (e) => {
      e.preventDefault();
      setMode(!isRegister);
    });

    window.submitAuth = async function () {
      const errEl = document.getElementById('err-msg');
      const btn = document.getElementById('submit-btn');
      errEl.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) {
        errEl.textContent = 'Email et mot de passe requis.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      try {
        if (!isRegister) {
          const cred = await signInWithEmailAndPassword(auth, email, password);
          const a = await getDoc(doc(db, 'artisans', cred.user.uid));
          if (a.exists()) { location.href = 'dashboard-artisan.html'; return; }
          const c = await getDoc(doc(db, 'clients', cred.user.uid));
          if (!c.exists()) throw new Error('Compte client introuvable.');
          location.href = next;
          return;
        }

        const fullName = document.getElementById('fullName').value.trim();
        const country = document.getElementById('country').value.trim();
        const city = document.getElementById('city').value.trim();
        const waPrefix = document.getElementById('waPrefix').value;
        const waNumberRaw = document.getElementById('waNumber').value.trim();
        const waNumber = waNumberRaw.replace(/\D/g, '');
        if (!fullName || !country || !city || !waNumber) {
          throw new Error('Remplis nom, pays, ville et WhatsApp.');
        }

        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await setDoc(doc(db, 'clients', cred.user.uid), {
          uid: cred.user.uid,
          role: 'client',
          fullName,
          country,
          city,
          whatsappPrefix: waPrefix,
          whatsappNumber: waNumber,
          whatsappFull: `${waPrefix}${waNumber}`,
          email,
          createdAt: serverTimestamp()
        });
        location.href = next;
      } catch (e) {
        errEl.textContent = e.message || 'Erreur de connexion/inscription';
        errEl.style.display = 'block';
      }
      btn.disabled = false;
    };
  </script>
  <script type="module" src="./platform-logo.js"></script>
</body>
</html>
