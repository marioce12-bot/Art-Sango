<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Produit - ArtSango</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --charcoal: #0e0c0a;
      --burnt: #bf6a3c;
      --gold: #c9a05a;
      --sand: #d8c4a0;
      --cream: #f4eadb;
      --teal: #0f766e;
      --glass: rgba(14,12,10,0.65);
      --glass-border: rgba(201,160,90,0.2);
      --card-bg: #fdf8f2;
      --card-border: #e8dcc8;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:"DM Sans",sans-serif; background:var(--charcoal); color:var(--cream); min-height:100dvh; }
    .bg {
      position: fixed; inset: 0; z-index: -2;
      background-image:
        linear-gradient(125deg, rgba(10,8,6,0.88) 0%, rgba(26,16,10,0.6) 50%, rgba(10,8,6,0.92) 100%),
        url("https://images.unsplash.com/photo-1541580621-cb2562a7a8a3?auto=format&fit=crop&w=1800&q=80");
      background-size: cover; background-position: center;
    }
    .topbar {
      position: fixed;
      top: calc(14px + env(safe-area-inset-top));
      left: 50%; transform: translateX(-50%);
      width: min(1160px, calc(100% - 32px));
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 12px 18px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    }
    .logo {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 700; font-size: 1.35rem;
      color: var(--cream); text-decoration: none;
      display: flex; align-items: center; gap: 9px;
    }
    .logo img { width: 32px; height: 32px; border-radius: 7px; object-fit: cover; display: none; }
    .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .btn-nav {
      text-decoration: none; font-size: .85rem; font-weight: 600;
      padding: 9px 16px; border-radius: 9px; transition: opacity .15s;
      border: none; cursor: pointer;
    }
    .btn-nav:hover { opacity: .85; }
    .btn-gold { background: linear-gradient(135deg, var(--gold), var(--burnt)); color: #1a0d06; }
    .btn-ghost { background: rgba(255,255,255,0.1); color: var(--cream); border: 1px solid var(--glass-border); }

    .wrap{ max-width:1160px; margin:0 auto; padding: calc(100px + env(safe-area-inset-top)) 16px calc(32px + env(safe-area-inset-bottom)); }
    .layout{ display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:4px; }

    /* ===== GALERIE MULTI-PHOTOS ===== */
    .gallery{ display:flex; flex-direction:column; gap:10px; }
    .main-img-zone{
      border-radius:16px; overflow:hidden;
      background:linear-gradient(125deg,#d7c4a0,#c8d8cc);
      border:1px solid var(--card-border);
      min-height:360px; position:relative;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      touch-action: pan-y;
    }
    .main-img-zone img{
      width:100%; height:100%; object-fit:cover;
      min-height:360px; display:block;
      position:absolute; inset:0;
    }
    .img-counter{
      position:absolute; bottom:10px; right:12px;
      background:rgba(0,0,0,0.55); color:#fff;
      font-size:.75rem; font-weight:700;
      padding:3px 9px; border-radius:999px;
      backdrop-filter:blur(4px);
    }
    .thumbnails{ display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; }
    .thumbnails::-webkit-scrollbar{ height:4px; }
    .thumbnails::-webkit-scrollbar-thumb{ background:#d7c4a0; border-radius:4px; }
    .thumb{
      flex-shrink:0; width:70px; height:70px;
      border-radius:10px; overflow:hidden;
      border:2.5px solid transparent;
      background:#e8dcc8; cursor:pointer;
      transition:border-color .15s, transform .15s;
    }
    .thumb:hover{ transform:scale(1.05); }
    .thumb.active{ border-color:var(--teal); }
    .thumb img{ width:100%; height:100%; object-fit:cover; }

    /* Lightbox */
    .lightbox{
      display:none; position:fixed; inset:0; z-index:1000;
      background:rgba(0,0,0,0.92);
      align-items:center; justify-content:center;
      flex-direction:column; gap:16px;
    }
    .lightbox.open{ display:flex; }
    .lightbox img{ max-width:90vw; max-height:80vh; border-radius:12px; object-fit:contain; }
    .lightbox-close{
      position:absolute; top:18px; right:22px;
      background:none; border:0; color:#fff; font-size:2rem; cursor:pointer;
    }
    .lightbox-nav{
      display:flex; gap:16px;
    }
    .lb-btn{
      border:0; background:rgba(255,255,255,0.15); color:#fff;
      border-radius:999px; padding:10px 18px; font-weight:700; cursor:pointer;
      font-size:1rem; transition:background .15s;
    }
    .lb-btn:hover{ background:rgba(255,255,255,0.28); }

    /* ===== INFOS ===== */
    .info{ display:flex; flex-direction:column; gap:12px; background:rgba(14,12,10,0.56); border:1px solid var(--glass-border); border-radius:16px; padding:18px; color:var(--cream); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
    h1{ margin:0; font-family:"Cormorant Garamond",serif; font-size:2.2rem; color:#fbf3e5; }
    .price{ font-size:2rem; font-weight:900; color:#f0c980; }
    .artisan-row{ display:flex; align-items:center; gap:10px; }
    .artisan-link{ color:var(--teal); font-weight:700; text-decoration:none; font-size:.95rem; }
    .badge{ font-size:.73rem; background:#dcfce7; color:#166534; padding:3px 8px; border-radius:999px; font-weight:700; }
    .desc{ line-height:1.7; color:var(--sand); font-size:.95rem; }
    .meta-row{ display:flex; gap:10px; flex-wrap:wrap; }
    .tag{ background:rgba(255,255,255,0.08); color:#e9d5b5; border:1px solid rgba(201,160,90,0.28); padding:5px 10px; border-radius:999px; font-size:.8rem; font-weight:600; }
    .actions{ display:flex; flex-direction:column; gap:10px; margin-top:8px; }
    .btn{ display:block; text-align:center; border:0; border-radius:12px; padding:13px 16px; font-weight:800; font-size:1rem; cursor:pointer; text-decoration:none; transition:transform .15s,opacity .15s; }
    .btn:hover{ transform:translateY(-1px); }
    .btn-main{ background:var(--teal); color:#fff; }
    .btn-wa{ background:#25D366; color:#fff; }
    .btn-outline{ background:transparent; border:2px solid rgba(201,160,90,0.45); color:var(--cream); font-weight:700; }

    /* ===== SIMILAIRES ===== */
    .similar{ margin-top:32px; }
    .similar h2{ font-family:"Cormorant Garamond",serif; margin-bottom:12px; font-size:2rem; }
    .sim-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .sim-card{ background:#fff; border:1px solid #e8dcc8; border-radius:12px; overflow:hidden; cursor:pointer; transition:transform .18s; color:#111827; }
    .sim-card:hover{ transform:translateY(-2px); }
    .sim-img{ height:110px; background:linear-gradient(125deg,#d7c4a0,#c8d8cc); overflow:hidden; position:relative; }
    .sim-img img{ width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
    .sim-meta{ padding:10px; font-size:.88rem; }
    @media (max-width:760px){ .layout{ grid-template-columns:1fr; } .sim-grid{ grid-template-columns:1fr 1fr; } .topbar{flex-direction:column;gap:8px;} .topbar-right{width:100%;justify-content:space-between;} }
    @media (max-width:480px){ .sim-grid{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>

  <header class="topbar">
    <a class="logo" href="index.html">
      <img class="platform-logo-dynamic" alt="Logo ArtSango">
      <span>ArtSango</span>
    </a>
    <div class="topbar-right">
      <button class="btn-nav btn-ghost" onclick="goBack('marketplace.html')">Retour</button>
      <a class="btn-nav btn-gold" href="panier.html">Panier</a>
    </div>
  </header>

  <div class="wrap">
    <div id="loading" style="text-align:center;padding:60px;color:#9ca3af;">Chargement du produit…</div>
    <div id="content" style="display:none;">
      <div class="layout">

        <!-- ===== GALERIE ===== -->
        <div class="gallery">
          <div class="main-img-zone" id="main-img-zone" onclick="openLightbox()">
            <img id="main-img" src="" alt="" style="display:none;">
            <span id="img-counter" class="img-counter" style="display:none;"></span>
          </div>
          <div class="thumbnails" id="thumbnails"></div>
        </div>

        <!-- ===== INFOS ===== -->
        <div class="info">
          <div>
            <div class="meta-row" id="prod-tags"></div>
            <h1 id="prod-name">—</h1>
            <div class="price" id="prod-price">—</div>
          </div>
          <div class="artisan-row">
            <span>Par</span>
            <a class="artisan-link" id="artisan-link" href="#">—</a>
            <span class="badge" id="artisan-badge" style="display:none;">✓ Vérifié</span>
          </div>
          <p class="desc" id="prod-desc">—</p>
          <div class="actions">
            <button class="btn btn-main" onclick="addToCart()">Ajouter au panier</button>
            <a class="btn btn-outline" id="msg-btn" href="#">Contacter la boutique</a>
            <a class="btn btn-wa" id="wa-btn" href="#" target="_blank" rel="noopener">Commander via WhatsApp</a>
            <button class="btn btn-outline" onclick="toggleFav()">Ajouter aux favoris</button>
          </div>
        </div>
      </div>

      <section class="similar">
        <h2>Créations similaires</h2>
        <div class="sim-grid" id="similar-grid"></div>
      </section>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
    <img id="lb-img" src="" alt="">
    <div class="lightbox-nav">
      <button class="lb-btn" onclick="lbPrev()">← Précédente</button>
      <button class="lb-btn" onclick="lbNext()">Suivante →</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp }                                           from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, getDocs, query, where, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyAghL7HcGVTWur9ijJzjWXywTgvCaiJ01M",
      authDomain:        "art-sango.firebaseapp.com",
      projectId:         "art-sango",
      storageBucket:     "art-sango.firebasestorage.app",
      messagingSenderId: "840868763552",
      appId:             "1:840868763552:web:b7cb1ac710d3b9968436c5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db  = getFirestore(app);
    const authPersistenceReady = setPersistence(auth, browserLocalPersistence)
      .catch((e) => console.warn('Persistance auth locale indisponible:', e.message));

    const params  = new URLSearchParams(location.search);
    const prodId  = params.get('id');
    let currentProduct = null;
    let currentUser = null;
    let currentRole = '';
    let authResolved = false;
    let resolveAuthReady;
    const authReady = new Promise((resolve) => { resolveAuthReady = resolve; });

    // ─── Galerie ────────────────────────────────────────────────
    let allImages = [];
    let activeIndex = 0;
    let swipeBound = false;
    let suppressLightboxTapUntil = 0;

    window.setActiveImage = function(idx) {
      activeIndex = idx;
      const img = document.getElementById('main-img');
      img.src = allImages[idx];
      img.style.display = 'block';
      // Mise à jour miniatures
      document.querySelectorAll('.thumb').forEach((t, i) => {
        t.classList.toggle('active', i === idx);
      });
      // Compteur
      const counter = document.getElementById('img-counter');
      if (allImages.length > 1) {
        counter.textContent = (idx + 1) + ' / ' + allImages.length;
        counter.style.display = 'block';
      }
    };

    window.openLightbox = function() {
      if (Date.now() < suppressLightboxTapUntil) return;
      if (!allImages.length) return;
      document.getElementById('lb-img').src = allImages[activeIndex];
      document.getElementById('lightbox').classList.add('open');
    };
    window.closeLightbox = function() {
      document.getElementById('lightbox').classList.remove('open');
    };
    window.lbNext = function() {
      activeIndex = (activeIndex + 1) % allImages.length;
      document.getElementById('lb-img').src = allImages[activeIndex];
      setActiveImage(activeIndex);
    };
    window.lbPrev = function() {
      activeIndex = (activeIndex - 1 + allImages.length) % allImages.length;
      document.getElementById('lb-img').src = allImages[activeIndex];
      setActiveImage(activeIndex);
    };

    function bindMobileSwipe() {
      if (swipeBound) return;
      const zone = document.getElementById('main-img-zone');
      if (!zone) return;

      let startX = 0;
      let startY = 0;
      let tracking = false;

      zone.addEventListener('touchstart', (e) => {
        if (!allImages.length || allImages.length < 2) return;
        const t = e.touches[0];
        startX = t.clientX;
        startY = t.clientY;
        tracking = true;
      }, { passive: true });

      zone.addEventListener('touchend', (e) => {
        if (!tracking || allImages.length < 2) return;
        const t = e.changedTouches[0];
        const dx = t.clientX - startX;
        const dy = t.clientY - startY;
        tracking = false;

        if (Math.abs(dx) < 36 || Math.abs(dx) < Math.abs(dy)) return;
        if (dx < 0) {
          activeIndex = (activeIndex + 1) % allImages.length;
        } else {
          activeIndex = (activeIndex - 1 + allImages.length) % allImages.length;
        }
        suppressLightboxTapUntil = Date.now() + 320;
        setActiveImage(activeIndex);
      }, { passive: true });

      swipeBound = true;
    }
    // Fermer lightbox sur Escape
    document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });

    function buildGallery(p) {
      // Récupère toutes les photos : photos[] en priorité, puis fallback imageUrl unique
      const rawPhotos = Array.isArray(p.photos) && p.photos.length > 0
        ? p.photos
        : [];
      const mainImg = p.imageUrl || p.imageURL || p.image || p.photoUrl || p.photo || p.img || '';
      if (mainImg && !rawPhotos.includes(mainImg)) rawPhotos.unshift(mainImg);
      allImages = rawPhotos.filter(Boolean);

      if (!allImages.length) return;

      setActiveImage(0);

      // Miniatures (seulement si >1 photo)
      if (allImages.length > 1) {
        const thumbsEl = document.getElementById('thumbnails');
        thumbsEl.innerHTML = allImages.map((url, i) => `
          <div class="thumb ${i===0?'active':''}" onclick="setActiveImage(${i})">
            <img src="${url}" alt="Photo ${i+1}" loading="lazy" onerror="this.parentElement.style.display='none'">
          </div>
        `).join('');
      }

      bindMobileSwipe();
    }

    await authPersistenceReady;
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      currentRole = '';
      if (!user) { authResolved = true; resolveAuthReady(); return; }
      try {
        const artisanSnap = await getDoc(doc(db, 'artisans', user.uid));
        if (artisanSnap.exists()) { currentRole = 'artisan'; localStorage.setItem('artsango_user_role', 'artisan'); }
        else {
          const clientSnap = await getDoc(doc(db, 'clients', user.uid));
          if (clientSnap.exists()) { currentRole = 'client'; localStorage.setItem('artsango_user_role', 'client'); }
        }
      } catch {}
      authResolved = true;
      resolveAuthReady();
    });

    // ─── Numéro WhatsApp : nettoyage robuste ────────────────────
    function formatWhatsAppNumber(raw) {
      if (!raw) return '';
      // Supprime tout sauf chiffres et + initial
      let cleaned = raw.replace(/[\s\-().]/g, '');
      // S'assure que le + est conservé si présent
      if (!cleaned.startsWith('+') && !cleaned.startsWith('00')) {
        // Si commence par 0 et <10 chiffres => probablement national Bénin
        // On ne préfixe pas automatiquement pour éviter les erreurs
        cleaned = cleaned;
      }
      // wa.me attend des chiffres sans + (ou avec)
      // Format final : supprime le + pour l'URL, garde les chiffres
      return cleaned.replace(/^\+/, '');
    }

    async function loadProduct() {
      let prod = null;
      try {
        if (prodId) {
          const snap = await getDoc(doc(db, 'produits', prodId));
          if (snap.exists()) prod = { id: snap.id, ...snap.data() };
        }
      } catch (e) { console.warn(e.message); }

      if (!prod) {
        document.getElementById('loading').textContent = 'Produit introuvable.';
        return;
      }
      currentProduct = prod;
      render(prod);
      loadSimilar(prod.category, prod.id);
    }

    async function render(p) {
      document.title = (p.name || 'Produit') + ' - ArtSango';

      // Galerie multi-photos
      buildGallery(p);

      document.getElementById('prod-name').textContent  = p.name || '—';
      document.getElementById('prod-price').textContent = p.price ? p.price.toLocaleString('fr-FR') + ' XOF' : '—';
      document.getElementById('prod-desc').textContent  = p.description || 'Aucune description disponible.';

      const tags = [p.category, p.country, p.stock ? p.stock + ' en stock' : null].filter(Boolean);
      document.getElementById('prod-tags').innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('');

      // ─── Lien vers la boutique de l'artisan ────────────────
      let artisanName = p.artisanName || '—';
      let artisanPhone = p.phone || '';

      // Si le produit ne contient pas le téléphone, on le cherche dans le profil artisan
      if (!artisanPhone && p.artisanId) {
        try {
          const aSnap = await getDoc(doc(db, 'artisans', p.artisanId));
          if (aSnap.exists()) {
            const aData = aSnap.data();
            artisanPhone = aData.phone || aData.whatsapp || '';
            if (!artisanName || artisanName === '—') artisanName = aData.brandName || '—';
          }
        } catch {}
      }

      document.getElementById('artisan-link').textContent = artisanName;
      document.getElementById('artisan-link').href = 'boutique-vendeur.html?id=' + (p.artisanId || '');
      if (p.verified) document.getElementById('artisan-badge').style.display = 'inline';

      const msgBtn = document.getElementById('msg-btn');
      if (p.artisanId) {
        msgBtn.href = `messagerie.html?artisanId=${encodeURIComponent(p.artisanId)}&productId=${encodeURIComponent(p.id || '')}&productName=${encodeURIComponent(p.name || '')}`;
      } else {
        msgBtn.href = '#';
        msgBtn.onclick = (e) => { e.preventDefault(); alert('Boutique introuvable pour ce produit.'); };
      }

      // ─── Bouton WhatsApp — numéro propre + message pré-rempli ──
      const waNumber = formatWhatsAppNumber(artisanPhone);
      const prodUrl  = window.location.href;
      const msg = encodeURIComponent(
        `Bonjour ! Je suis intéressé(e) par votre produit "${p.name}" à ${p.price ? p.price.toLocaleString('fr-FR') + ' XOF' : '?'} sur ArtSango.\n\nLien produit : ${prodUrl}\n\nEst-il toujours disponible ?`
      );

      const waBtn = document.getElementById('wa-btn');
      if (waNumber) {
        waBtn.href = `https://wa.me/${waNumber}?text=${msg}`;
      } else {
        // Pas de numéro connu : on désactive le bouton avec message
        waBtn.href = '#';
        waBtn.textContent = 'WhatsApp non disponible';
        waBtn.style.background = '#9ca3af';
        waBtn.onclick = (e) => { e.preventDefault(); alert("Le vendeur n'a pas renseigné de numéro WhatsApp."); };
      }

      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    }

    async function loadSimilar(category, excludeId) {
      const grid = document.getElementById('similar-grid');
      let items = [];
      try {
        const snap = await getDocs(query(collection(db, 'produits'), where('category', '==', category), limit(4)));
        items = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(p => p.id !== excludeId).slice(0, 3);
      } catch {}
      if (!items.length) { grid.innerHTML = '<p style="color:#9ca3af;font-size:.9rem;">Aucune création similaire pour l\'instant.</p>'; return; }
      grid.innerHTML = items.map(p => {
        const img = p.photos?.[0] || p.imageUrl || p.imageURL || p.image || '';
        return `
        <div class="sim-card" onclick="window.location.href='produit-detail.html?id=${p.id}'">
          <div class="sim-img">${img ? `<img src="${img}" style="width:100%;height:100%;object-fit:cover;" loading="lazy">` : ''}</div>
          <div class="sim-meta"><strong>${p.name}</strong><div style="color:#0f766e;font-weight:700;margin-top:4px;">${(p.price||0).toLocaleString('fr-FR')} XOF</div></div>
        </div>`;
      }).join('');
    }

    window.addToCart = async function() {
      if (!authResolved) await authReady;
      if (!currentUser || (currentRole !== 'client' && currentRole !== 'artisan')) {
        window.location.href = `connexion-client.html?next=${encodeURIComponent('produit-detail.html?id=' + currentProduct.id)}`;
        return;
      }
      const cart = JSON.parse(localStorage.getItem('artsango_cart') || '[]');
      const already = cart.find(c => c.id === currentProduct.id);
      if (!already) {
        const firstImg = currentProduct.photos?.[0] || currentProduct.imageUrl || currentProduct.imageURL || currentProduct.image || '';
        cart.push({
          id: currentProduct.id,
          name: currentProduct.name,
          price: currentProduct.price,
          artisanName: currentProduct.artisanName,
          artisanId: currentProduct.artisanId,
          imageUrl: firstImg
        });
      }
      localStorage.setItem('artsango_cart', JSON.stringify(cart));
      alert('✅ Ajouté au panier !');
    };

    window.toggleFav = function() {
      const favs = JSON.parse(localStorage.getItem('artsango_favs') || '[]');
      const idx  = favs.indexOf(currentProduct.id);
      if (idx > -1) favs.splice(idx, 1); else favs.push(currentProduct.id);
      localStorage.setItem('artsango_favs', JSON.stringify(favs));
      alert(idx > -1 ? 'Retiré des favoris.' : '❤️ Ajouté aux favoris !');
    };

    loadProduct();
  </script>
  <script>
    function goBack(fallback) {
      if (window.history.length > 1) window.history.back(); else window.location.href = fallback;
    }
