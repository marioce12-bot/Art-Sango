<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Connexion - ArtSango</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --charcoal:#0e0c0a; --burnt:#bf6a3c; --gold:#c9a05a; --sand:#d8c4a0; --cream:#f4eadb;
      --brand:#0f766e; --brand-dark:#0c5e58; --glass:rgba(14,12,10,0.62); --glass-border:rgba(201,160,90,0.24);
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:"DM Sans",Tahoma,sans-serif; background:var(--charcoal); color:var(--cream); min-height:100dvh; }
    .bg { position:fixed; inset:0; z-index:-2; background-image:linear-gradient(125deg, rgba(10,8,6,.88) 0%, rgba(26,16,10,.6) 50%, rgba(10,8,6,.92) 100%), url("https://images.unsplash.com/photo-1541580621-cb2562a7a8a3?auto=format&fit=crop&w=1800&q=80"); background-size:cover; background-position:center; }
    .wrap { padding:20px; padding-bottom:calc(20px + env(safe-area-inset-bottom)); }
    .box { max-width:460px; margin:0 auto; background:var(--glass); border:1px solid var(--glass-border); border-radius:16px; padding:28px; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
    h1 { margin:0 0 6px; font-family:"Cormorant Garamond",serif; font-size:2rem; color:#fbf3e5; }
    .sub { color:var(--sand); font-size:.9rem; margin:0 0 22px; }
    label { display:block; font-size:.83rem; font-weight:600; margin-bottom:5px; color:#e8d2b4; }
    input { width:100%; padding:11px 14px; margin-bottom:16px; border:1.5px solid rgba(201,160,90,.35); border-radius:10px; font:inherit; font-size:.95rem; transition:border-color .15s; background:rgba(10,8,6,.45); color:var(--cream); }
    input:focus { outline:none; border-color:var(--brand); }
    .btn-submit { width:100%; background:linear-gradient(135deg,var(--gold),var(--burnt)); color:#23120a; border:0; padding:13px; border-radius:10px; font-weight:700; font-size:1rem; cursor:pointer; transition:opacity .15s; }
    .btn-submit:hover { background:var(--brand-dark); }
    .btn-submit:disabled { opacity:.5; cursor:not-allowed; }
    .err { color:#dc2626; font-size:.85rem; background:#fef2f2; border:1px solid #fecaca; border-radius:8px; padding:10px 12px; margin-bottom:14px; display:none; }
    .link-row { margin-top:16px; font-size:.9rem; }
    a { color:var(--gold); font-weight:600; text-decoration:none; }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="wrap">
    <div class="box">
      <h1>Se connecter</h1>
      <p class="sub">Connexion unique pour client et vendeur.</p>
      <div class="err" id="err-msg"></div>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="ton@email.com" autocomplete="email">
      <label for="password">Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <button class="btn-submit" id="login-btn" onclick="doLogin()">Se connecter</button>
      <p class="link-row"><a href="inscription-artisan.html">Je crée mon compte</a></p>
    </div>
  </div>

  <script type="module">
    import { initializeApp }                         from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged }   from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc }             from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // ─── REMPLACE avec tes valeurs Firebase ───────────────────────
    const firebaseConfig = {
      apiKey:            "AIzaSyAghL7HcGVTWur9ijJzjWXywTgvCaiJ01M",
      authDomain:        "art-sango.firebaseapp.com",
      projectId:         "art-sango",
      storageBucket:     "art-sango.firebasestorage.app",
      messagingSenderId: "840868763552",
      appId:             "1:840868763552:web:b7cb1ac710d3b9968436c5"
    };
    // ──────────────────────────────────────────────────────────────

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      try {
        const artisanSnap = await getDoc(doc(db, 'artisans', user.uid));
        if (artisanSnap.exists()) {
          window.location.href = 'dashboard-artisan.html';
          return;
        }
        const clientSnap = await getDoc(doc(db, 'clients', user.uid));
        if (clientSnap.exists()) {
          window.location.href = 'marketplace.html';
        }
      } catch {}
    });

    window.doLogin = async function () {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl    = document.getElementById('err-msg');
      const btn      = document.getElementById('login-btn');

      errEl.style.display = 'none';
      if (!email || !password) {
        errEl.textContent = 'Remplis email et mot de passe.';
        errEl.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Connexion…';
      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const uid = cred.user.uid;
        const artisanSnap = await getDoc(doc(db, 'artisans', uid));
        if (artisanSnap.exists()) {
          window.location.href = 'dashboard-artisan.html';
          return;
        }
        const clientSnap = await getDoc(doc(db, 'clients', uid));
        if (clientSnap.exists()) {
          window.location.href = 'marketplace.html';
          return;
        }
        errEl.textContent = 'Compte introuvable dans la plateforme.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      } catch (e) {
        const msgs = {
          'auth/user-not-found':  'Aucun compte avec cet email.',
          'auth/wrong-password':  'Mot de passe incorrect.',
          'auth/invalid-email':   'Email invalide.',
          'auth/too-many-requests': 'Trop de tentatives. Réessaie plus tard.',
        };
        errEl.textContent = msgs[e.code] || 'Erreur : ' + e.message;
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Se connecter';
      }
    };

    // Appui sur Entrée
    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') window.doLogin(); });
  </script>
  <script type="module" src="./platform-logo.js"></script>
</body>
</html>
